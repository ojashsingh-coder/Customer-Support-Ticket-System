<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up · Ojash Desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
<link rel="stylesheet" href="style.css">
<style>

/* Canvas layers */
#bg-canvas, #particles-canvas {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0;
}
#bg-canvas { z-index: 0; }
#particles-canvas { z-index: 1; }

/* Orbs */
.orb {
  position: fixed; border-radius: 50%;
  pointer-events: none; z-index: 2;
  filter: blur(70px); will-change: transform;
}
.orb-1 { width:500px;height:500px; background:radial-gradient(circle,rgba(124,58,237,.28) 0%,transparent 70%); top:-150px;left:-150px; animation:orbFloat1 18s ease-in-out infinite; }
.orb-2 { width:420px;height:420px; background:radial-gradient(circle,rgba(139,92,246,.18) 0%,transparent 70%); bottom:-100px;right:-100px; animation:orbFloat2 22s ease-in-out infinite; }
.orb-3 { width:280px;height:280px; background:radial-gradient(circle,rgba(167,139,250,.13) 0%,transparent 70%); top:45%;left:65%; animation:orbFloat3 16s ease-in-out infinite; }
@keyframes orbFloat1{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(80px,60px) scale(1.12)}66%{transform:translate(-40px,100px) scale(.94)}}
@keyframes orbFloat2{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(-60px,-80px) scale(1.09)}70%{transform:translate(50px,-30px) scale(.91)}}
@keyframes orbFloat3{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.6}50%{transform:translate(-50%,-50%) scale(1.3);opacity:1}}

.auth-page {
  background: transparent;
  position: relative; z-index: 3;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 32px 16px;
}

/* Wider card */
.auth-container { max-width: 480px; position: relative; z-index: 4; }

/* Glassmorphism card */
.auth-card {
  background: rgba(20,18,38,0.82) !important;
  backdrop-filter: blur(28px) saturate(200%) brightness(1.05);
  -webkit-backdrop-filter: blur(28px) saturate(200%) brightness(1.05);
  border: 1px solid rgba(255,255,255,0.10) !important;
  box-shadow:
    0 8px 40px rgba(0,0,0,.6),
    0 0 0 1px rgba(124,58,237,.10),
    inset 0 1px 0 rgba(255,255,255,.07) !important;
  position: relative; overflow: hidden;
  animation: cardReveal .75s cubic-bezier(.22,.68,0,1.2) both;
}
@keyframes cardReveal{from{opacity:0;transform:translateY(36px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

/* Shimmer border */
.auth-card::before {
  content:''; position:absolute; inset:-1px; border-radius:inherit; padding:1px;
  background:linear-gradient(135deg,rgba(124,58,237,.7) 0%,rgba(167,139,250,.4) 25%,rgba(255,255,255,.06) 50%,rgba(139,92,246,.4) 75%,rgba(124,58,237,.7) 100%);
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor; mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  mask-composite:exclude; background-size:300% 300%;
  animation:borderShimmer 5s linear infinite; pointer-events:none;
}
@keyframes borderShimmer{0%{background-position:0% 0%}100%{background-position:300% 300%}}

/* Step progress bar */
.reg-progress {
  display: flex; align-items: center; gap: 0;
  margin-bottom: 24px; position: relative;
}
.reg-step {
  display: flex; flex-direction: column; align-items: center;
  flex: 1; position: relative; gap: 6px;
}
.reg-step-circle {
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(255,255,255,.06);
  border: 1.5px solid rgba(255,255,255,.12);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; font-weight: 700;
  color: var(--text-muted);
  position: relative; z-index: 2;
  transition: all .35s ease;
}
.reg-step.active .reg-step-circle {
  background: var(--brand-primary); border-color: var(--brand-primary);
  color: #fff;
  animation: stepBreathe 1.8s ease-in-out infinite;
}
@keyframes stepBreathe {
  0%,100% { box-shadow: 0 0 14px rgba(124,58,237,.5); }
  50%     { box-shadow: 0 0 24px rgba(124,58,237,.9), 0 0 5px rgba(124,58,237,1); }
}
.reg-step.done .reg-step-circle {
  background: #10b981; border-color: #10b981; color: #fff;
  animation: stepSettle .5s ease both;
}
@keyframes stepSettle{0%{transform:scale(1);box-shadow:0 0 0 rgba(16,185,129,0)}40%{transform:scale(1.24);box-shadow:0 0 24px rgba(16,185,129,.9)}100%{transform:scale(1);box-shadow:0 0 10px rgba(16,185,129,.4)}}
.reg-step-label {
  font-size: .68rem; color: var(--text-muted);
  font-weight: 500; text-align: center; transition: color .3s ease;
}
.reg-step.active .reg-step-label { color: var(--brand-accent); }
.reg-step.done  .reg-step-label  { color: #10b981; }

.reg-step-line {
  flex: 1; height: 1.5px;
  background: rgba(255,255,255,.08);
  margin-top: -15px;
  position: relative; overflow: visible;
}
.reg-step-line-fill {
  position: absolute; top: 0; left: 0; height: 100%;
  background: linear-gradient(90deg, var(--brand-primary), #10b981);
  width: 0%; transition: width .55s ease; border-radius: 1px;
}
/* Spark bead */
.reg-step-line-fill::after {
  content: ''; position: absolute; top: 50%; right: -3px;
  width: 7px; height: 7px; border-radius: 50%;
  background: #d8f8e8; transform: translateY(-50%);
  box-shadow: 0 0 8px 2px rgba(16,185,129,.9), 0 0 16px 4px rgba(16,185,129,.5);
  opacity: 0; transition: opacity .2s ease;
}
.reg-step-line-fill.traveling::after {
  opacity: 1;
  animation: sparkTravel .65s ease both;
}
@keyframes sparkTravel {
  0%   { left:0%;   right:auto; transform:translate(-50%,-50%); opacity:1; }
  85%  { left:100%; right:auto; transform:translate(-50%,-50%); opacity:1; }
  100% { left:100%; right:auto; transform:translate(-50%,-50%); opacity:0; }
}

/* Floating label fields */
.float-group {
  position: relative; margin-bottom: 18px;
  animation: fadeUp .45s ease both;
}
.float-group:nth-child(1){animation-delay:.38s}
.float-group:nth-child(2){animation-delay:.44s}
.float-group:nth-child(3){animation-delay:.50s}
.float-group:nth-child(4){animation-delay:.56s}
.float-group:nth-child(5){animation-delay:.62s}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.float-input {
  width: 100%;
  background: rgba(12,10,28,.65);
  border: 1px solid rgba(255,255,255,.10);
  border-radius: 12px;
  padding: 22px 44px 8px 44px;
  font-size: .9rem; color: var(--text-primary);
  font-family: 'Inter', sans-serif;
  transition: border-color .25s ease, box-shadow .25s ease, background .25s ease;
  outline: none;
}
.float-input.no-icon { padding-left: 16px; }
.float-input::placeholder { color: transparent; }
.float-input:focus {
  border-color: var(--brand-primary);
  background: rgba(124,58,237,.07);
  box-shadow: 0 0 0 3px rgba(124,58,237,.20), 0 2px 10px rgba(124,58,237,.12);
}
.float-label {
  position: absolute; left: 44px; top: 50%; transform: translateY(-50%);
  font-size: .875rem; color: rgba(160,160,192,.75);
  pointer-events: none; transition: all .2s cubic-bezier(.22,.68,0,1.2);
  transform-origin: left center; white-space: nowrap;
}
.float-group.no-icon .float-label { left: 16px; }
.float-input:focus + .float-label,
.float-input:not(:placeholder-shown) + .float-label {
  top: 10px; transform: translateY(0) scale(.78);
  color: var(--brand-accent); font-weight: 600;
}
.float-icon-left {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: rgba(160,160,192,.45); pointer-events: none; transition: color .25s ease;
}
.float-input:focus ~ .float-icon-left { color: var(--brand-accent); }
.float-icon-right {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  color: rgba(160,160,192,.45); cursor: pointer; transition: color .25s ease;
}
.float-icon-right:hover { color: var(--text-primary); }
.float-group::after {
  content: ''; position: absolute; inset: 0; border-radius: 12px; opacity: 0;
  box-shadow: 0 0 0 3px rgba(124,58,237,.22); transition: opacity .25s ease; pointer-events: none;
}
.float-group:focus-within::after { opacity: 1; }

/* Select */
.float-select {
  width: 100%; background: rgba(12,10,28,.65);
  border: 1px solid rgba(255,255,255,.10); border-radius: 12px;
  padding: 14px 16px; font-size: .875rem; color: var(--text-primary);
  font-family: 'Inter', sans-serif; transition: border-color .25s ease, box-shadow .25s ease;
  outline: none; cursor: pointer; appearance: none;
}
.float-select:focus { border-color: var(--brand-primary); box-shadow: 0 0 0 3px rgba(124,58,237,.18); }
.select-wrap { position: relative; margin-bottom: 18px; animation: fadeUp .45s ease .53s both; }
.select-label { display: block; font-size: .78rem; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; letter-spacing: .03em; }
.select-arrow { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: rgba(160,160,192,.45); pointer-events: none; }

/* Password strength */
.strength-row { display: flex; gap: 4px; margin-top: 8px; }
.strength-seg { flex: 1; height: 3px; border-radius: 2px; background: rgba(255,255,255,.08); transition: background .3s ease; }
.strength-seg.weak   { background: #ef4444; }
.strength-seg.fair   { background: #f59e0b; }
.strength-seg.good   { background: #3b82f6; }
.strength-seg.strong { background: #10b981; }
.strength-hint { font-size: .72rem; color: var(--text-muted); margin-top: 5px; height: 14px; transition: color .3s ease; }

/* Two-column grid */
.float-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media(max-width:520px){ .float-grid { grid-template-columns: 1fr; } }

/* Terms checkbox */
.terms-check {
  display: flex; align-items: flex-start; gap: 10px;
  margin-bottom: 20px; animation: fadeUp .45s ease .70s both;
}
.terms-check input[type="checkbox"] {
  appearance: none; width: 16px; height: 16px; flex-shrink: 0; margin-top: 2px;
  border: 1.5px solid rgba(255,255,255,.2); border-radius: 4px;
  background: rgba(255,255,255,.04); cursor: pointer; transition: all .15s ease; position: relative;
}
.terms-check input[type="checkbox"]:checked { background: var(--brand-primary); border-color: var(--brand-primary); }
.terms-check input[type="checkbox"]:checked::after { content:'✓'; position:absolute; top:-1px; left:2px; font-size:11px; color:#fff; font-weight:700; }
.terms-check label { font-size: .82rem; color: var(--text-secondary); line-height: 1.5; cursor: pointer; }
.terms-check a { color: var(--brand-accent); }

/* Submit button */
.btn-auth-submit {
  width: 100%; padding: 14px 24px;
  background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 45%, #9333ea 100%);
  background-size: 200% 200%;
  color: #fff; border: none; border-radius: 12px;
  font-size: .95rem; font-weight: 600; font-family: 'Inter', sans-serif;
  cursor: pointer; position: relative; overflow: hidden;
  transition: transform .3s cubic-bezier(.22,.68,0,1.2), box-shadow .3s ease;
  animation: fadeUp .45s ease .75s both;
  box-shadow: 0 4px 20px rgba(124,58,237,.3);
}
.btn-auth-submit::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.22) 50%,transparent 70%);
  transform:translateX(-100%); transition:transform 0s; pointer-events:none;
}
.btn-auth-submit:hover { box-shadow:0 8px 30px rgba(124,58,237,.6),0 2px 8px rgba(0,0,0,.3); }
.btn-auth-submit:hover::before { transform:translateX(120%); transition:transform .55s ease; }
.btn-auth-submit:active { transform:scale(.97) !important; }
.btn-auth-submit .ripple {
  position:absolute; border-radius:50%;
  background:rgba(255,255,255,.28);
  transform:scale(0); animation:rippleAnim .55s linear; pointer-events:none;
}
@keyframes rippleAnim{to{transform:scale(4);opacity:0}}
.btn-auth-submit.loading { pointer-events:none; opacity:.85; }
.btn-auth-submit .btn-text { transition:opacity .2s ease; }
.btn-auth-submit .btn-spinner {
  display:none; width:18px;height:18px;
  border:2px solid rgba(255,255,255,.3); border-top-color:#fff;
  border-radius:50%; animation:spin .6s linear infinite;
  position:absolute; left:50%;top:50%; margin:-9px 0 0 -9px;
}
.btn-auth-submit.loading .btn-text{opacity:0}
.btn-auth-submit.loading .btn-spinner{display:block}

/* Social buttons */
.auth-social-btn {
  background:rgba(255,255,255,.04) !important;
  border:1px solid rgba(255,255,255,.10) !important;
  border-radius:12px !important;
  transition:all .22s ease !important;
  position:relative; overflow:hidden;
}
.auth-social-btn:hover {
  background:rgba(255,255,255,.09) !important;
  border-color:rgba(124,58,237,.38) !important;
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(0,0,0,.35);
}

/* Logo */
.auth-logo { animation:logoIn .65s cubic-bezier(.22,.68,0,1.2) .15s both; }
@keyframes logoIn{from{opacity:0;transform:scale(.75) translateY(-14px)}to{opacity:1;transform:scale(1) translateY(0)}}
.auth-logo-icon {
  background:linear-gradient(135deg,#7c3aed,#a78bfa) !important;
  box-shadow:0 0 20px rgba(124,58,237,.55),0 4px 14px rgba(0,0,0,.35) !important;
  animation:logoIconPulse 3.2s ease-in-out infinite !important;
}
@keyframes logoIconPulse{0%,100%{box-shadow:0 0 18px rgba(124,58,237,.5),0 4px 12px rgba(0,0,0,.3)}50%{box-shadow:0 0 36px rgba(124,58,237,.85),0 4px 22px rgba(0,0,0,.4)}}

.auth-title {
  animation:fadeUp .5s ease .25s both;
  background:linear-gradient(135deg,#f0f0ff 0%,#c4b5fd 60%,#a78bfa 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.auth-subtitle { animation:fadeUp .5s ease .32s both; }
.auth-divider  { animation:fadeUp .45s ease .8s both; }
.social-stagger{ animation:fadeUp .45s ease .85s both; }
.auth-footer   { animation:fadeUp .5s ease .9s both; }

/* Role cards */
.role-cards { display:flex; gap:8px; margin-bottom:18px; animation:fadeUp .45s ease .53s both; }
.role-card {
  flex:1; padding:10px 8px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08);
  border-radius:10px; cursor:pointer;
  text-align:center; transition:all .2s ease;
}
.role-card:hover { background:rgba(124,58,237,.09); border-color:rgba(124,58,237,.32); }
.role-card.selected {
  background:rgba(124,58,237,.15); border-color:var(--brand-primary);
  box-shadow:0 0 14px rgba(124,58,237,.22);
}
.role-card-icon  { font-size:1.2rem; margin-bottom:4px; }
.role-card-label { font-size:.7rem; font-weight:600; color:var(--text-secondary); }
.role-card.selected .role-card-label { color:var(--brand-accent); }

/* Toasts */
.toast-container { z-index:10000; }
.toast { position:relative; overflow:visible !important; animation:toastIn .45s cubic-bezier(.22,.68,0,1.2) both !important; backdrop-filter:blur(10px); }
.toast::before { content:''; position:absolute; inset:-2px; border-radius:inherit; z-index:-1; opacity:0; animation:toastRadiate 1.1s ease-out both; }
.toast.success::before { background:radial-gradient(circle,rgba(16,185,129,.5),transparent 70%); }
.toast.error::before   { background:radial-gradient(circle,rgba(239,68,68,.5),transparent 70%); }
.toast.info::before    { background:radial-gradient(circle,rgba(59,130,246,.5),transparent 70%); }
.toast.warning::before { background:radial-gradient(circle,rgba(245,158,11,.5),transparent 70%); }
@keyframes toastIn{from{opacity:0;transform:translateX(40px) scale(.92)}to{opacity:1;transform:translateX(0) scale(1)}}
@keyframes toastRadiate{0%{opacity:.85;transform:scale(.7)}100%{opacity:0;transform:scale(2.1)}}
@keyframes spin{to{transform:rotate(360deg)}}

/*
   LIGHT MODE — dedicated design (dark mode above is untouched)
   Frosted white glass card, ink-purple title, soft pastel aurora,
   warm "daylight" accent blob instead of the dark violet glow.
*/
body.light-theme .auth-card {
  background: rgba(255,255,255,0.88) !important;
  backdrop-filter: blur(28px) saturate(160%) brightness(1.02);
  -webkit-backdrop-filter: blur(28px) saturate(160%) brightness(1.02);
  border: 1px solid rgba(20,18,38,0.08) !important;
  box-shadow:
    0 8px 40px rgba(80,60,140,0.14),
    0 0 0 1px rgba(124,58,237,0.06),
    inset 0 1px 0 rgba(255,255,255,0.9) !important;
}
body.light-theme .auth-title {
  background: linear-gradient(135deg, #5b21b6 0%, #7c3aed 55%, #4c1d95 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

body.light-theme .float-input,
body.light-theme .float-select {
  background: rgba(244,244,251,0.9);
  border: 1px solid rgba(20,18,38,0.12);
  color: var(--text-primary);
}
body.light-theme .float-input:focus {
  background: rgba(124,58,237,0.045);
  box-shadow: 0 0 0 3px rgba(124,58,237,0.14), 0 2px 10px rgba(124,58,237,0.08);
}
body.light-theme .float-label { color: rgba(70,65,100,0.62); }
body.light-theme .float-icon-left,
body.light-theme .float-icon-right,
body.light-theme .select-arrow { color: rgba(70,65,100,0.5); }
body.light-theme .float-icon-right:hover { color: var(--text-primary); }

body.light-theme .reg-step-circle { background: rgba(20,18,38,0.04); border-color: rgba(20,18,38,0.12); }
body.light-theme .reg-step-line { background: rgba(20,18,38,0.08); }

body.light-theme .terms-check input[type="checkbox"] {
  border: 1.5px solid rgba(20,18,38,0.2);
  background: rgba(20,18,38,0.03);
}

body.light-theme .auth-social-btn {
  background: rgba(20,18,38,0.035) !important;
  border: 1px solid rgba(20,18,38,0.1) !important;
}
body.light-theme .auth-social-btn:hover {
  background: rgba(20,18,38,0.065) !important;
  border-color: rgba(124,58,237,0.32) !important;
  box-shadow: 0 6px 20px rgba(80,60,140,0.12);
}

body.light-theme .role-card {
  background: rgba(20,18,38,0.025);
  border: 1px solid rgba(20,18,38,0.08);
}
body.light-theme .role-card:hover { background: rgba(124,58,237,0.08); border-color: rgba(124,58,237,0.28); }
body.light-theme .role-card.selected { background: rgba(124,58,237,0.1); }

/* Softer, more transparent orbs so they read as pastel haze, not a dark glow */
body.light-theme .orb-1 { background: radial-gradient(circle, rgba(124,58,237,0.14) 0%, transparent 70%); }
body.light-theme .orb-2 { background: radial-gradient(circle, rgba(251,191,110,0.16) 0%, transparent 70%); }
body.light-theme .orb-3 { background: radial-gradient(circle, rgba(167,139,250,0.10) 0%, transparent 70%); }
</style>
</head>
<body>
<script>(function(){try{var t=localStorage.getItem('ojashdesk_theme')||'dark';var r=t;if(t==='system'){r=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';}var c=r==='light'?'light-theme':'dark-theme';document.documentElement.classList.add(c);document.body.classList.add(c);}catch(e){}})();</script>

<canvas id="bg-canvas"></canvas>
<canvas id="particles-canvas"></canvas>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="auth-page">
  <div class="auth-container">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/></svg>
        </div>
        <div>
          <div class="auth-logo-text">Ojash Desk</div>
          <div class="auth-logo-sub">Support Workspace</div>
        </div>
      </div>

      <!-- Step progress -->
      <div class="reg-progress" id="regProgress">
        <div class="reg-step active" data-step="1">
          <div class="reg-step-circle">1</div>
          <div class="reg-step-label">Account</div>
        </div>
        <div class="reg-step-line"><div class="reg-step-line-fill" id="progressFill"></div></div>
        <div class="reg-step" data-step="2">
          <div class="reg-step-circle">2</div>
          <div class="reg-step-label">Profile</div>
        </div>
        <div class="reg-step-line"><div class="reg-step-line-fill" id="progressFill2"></div></div>
        <div class="reg-step" data-step="3">
          <div class="reg-step-circle">✓</div>
          <div class="reg-step-label">Done</div>
        </div>
      </div>

      <div class="auth-title" id="authTitle">Create your account</div>
      <div class="auth-subtitle" style="margin-bottom:22px;">Start managing support tickets in minutes</div>

      <form id="registerForm" autocomplete="on">

        <div class="float-grid">
          <div class="float-group">
            <input class="float-input" type="text" id="regName" placeholder="name" autocomplete="name" required autofocus>
            <label class="float-label" for="regName">Full name</label>
            <span class="float-icon-left">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>

<script>
/* 1. AURORA BACKGROUND CANVAS */
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H;
  const isLight = document.body.classList.contains('light-theme');
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  const blobsDark = [
    { x:.22,y:.50,r:.44,hue:263,sat:70,lig:40,alpha:.22,speed:.00018,phase:0.0 },
    { x:.78,y:.22,r:.38,hue:250,sat:60,lig:35,alpha:.16,speed:.00013,phase:1.2 },
    { x:.58,y:.80,r:.32,hue:275,sat:65,lig:45,alpha:.13,speed:.00021,phase:2.4 },
    { x:.12,y:.82,r:.28,hue:240,sat:55,lig:30,alpha:.12,speed:.00015,phase:0.8 },
    { x:.88,y:.62,r:.30,hue:285,sat:60,lig:42,alpha:.11,speed:.00017,phase:3.5 },
  ];
  const blobsLight = [
    { x:.22,y:.50,r:.44,hue:263,sat:60,lig:88,alpha:.16,speed:.00018,phase:0.0 },
    { x:.78,y:.22,r:.38,hue:250,sat:55,lig:90,alpha:.13,speed:.00013,phase:1.2 },
    { x:.58,y:.80,r:.32,hue:275,sat:55,lig:90,alpha:.10,speed:.00021,phase:2.4 },
    { x:.12,y:.82,r:.28,hue:38, sat:75,lig:88,alpha:.10,speed:.00015,phase:0.8 }, // warm daylight accent
    { x:.88,y:.62,r:.30,hue:285,sat:50,lig:92,alpha:.09,speed:.00017,phase:3.5 },
  ];
  const blobs = isLight ? blobsLight : blobsDark;
  const baseFill = isLight ? '#f4f4fb' : '#0d0d14';
  let t = 0;
  function draw() {
    t++;
    ctx.fillStyle = baseFill;
    ctx.fillRect(0, 0, W, H);
    blobs.forEach(b => {
      const ox = Math.sin(t * b.speed * 1.1 + b.phase) * 0.12;
      const oy = Math.cos(t * b.speed * 0.9 + b.phase + 1) * 0.10;
      const cx = (b.x + ox) * W;
      const cy = (b.y + oy) * H;
      const radius = b.r * Math.min(W, H);
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
      grad.addColorStop(0, `hsla(${b.hue},${b.sat}%,${b.lig}%,${b.alpha})`);
      grad.addColorStop(.5, `hsla(${b.hue},${b.sat}%,${b.lig}%,${b.alpha*.4})`);
      grad.addColorStop(1, `hsla(${b.hue},${b.sat}%,${b.lig}%,0)`);
      ctx.beginPath(); ctx.fillStyle = grad;
      ctx.arc(cx, cy, radius, 0, Math.PI*2); ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* 2. PARTICLE NETWORK */
(function() {
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');
  let W, H;
  const particles = [], mouse = {x:-1000,y:-1000};
  const isLight = document.body.classList.contains('light-theme');
  const lineAlphaBase = isLight ? .09 : .12;
  const dotLightness  = isLight ? 50 : 72;
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  for (let i = 0; i < 75; i++) {
    particles.push({ x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.8+.3,
      vx:(Math.random()-.5)*.22, vy:(Math.random()-.5)*.22, alpha:Math.random()*.45+.08, hue:248+Math.random()*42 });
  }
  window.addEventListener('mousemove', e=>{ mouse.x=e.clientX; mouse.y=e.clientY; });
  function draw() {
    ctx.clearRect(0,0,W,H);
    for (let i=0;i<particles.length;i++) for (let j=i+1;j<particles.length;j++) {
      const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if (d<110) {
        ctx.beginPath(); ctx.strokeStyle=`rgba(124,58,237,${lineAlphaBase*(1-d/110)})`; ctx.lineWidth=.5;
        ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y); ctx.stroke();
      }
    }
    particles.forEach(p=>{
      const mdx=p.x-mouse.x,mdy=p.y-mouse.y,md=Math.sqrt(mdx*mdx+mdy*mdy);
      if (md<100){p.vx+=mdx/md*.06;p.vy+=mdy/md*.06;}
      const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
      if (spd>1.1){p.vx*=.97;p.vy*=.97;}
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      ctx.beginPath();
      const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*3);
      g.addColorStop(0,`hsla(${p.hue},70%,${dotLightness}%,${p.alpha})`);
      g.addColorStop(1,`hsla(${p.hue},70%,${dotLightness}%,0)`);
      ctx.fillStyle=g; ctx.arc(p.x,p.y,p.r*3,0,Math.PI*2); ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* 3. MAGNETIC BUTTON + RIPPLE (register) */
(function() {
  const btn = document.getElementById('registerBtn');
  if (!btn) return;
  let isHovering = false;
  btn.addEventListener('mouseenter', () => { isHovering = true; });
  btn.addEventListener('mouseleave', () => { isHovering = false; btn.style.transform = ''; });
  btn.addEventListener('mousemove', function(e) {
    if (!isHovering) return;
    const rect = btn.getBoundingClientRect();
    const dx = (e.clientX - (rect.left + rect.width/2)) / (rect.width/2);
    const dy = (e.clientY - (rect.top  + rect.height/2)) / (rect.height/2);
    btn.style.transform = `translate(${dx*5}px,${dy*4}px)`;
  });
  btn.addEventListener('click', function(e) {
    const rect = btn.getBoundingClientRect();
    const r = document.createElement('span');
    r.className = 'ripple';
    const size = Math.max(rect.width, rect.height);
    r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
    btn.appendChild(r);
    setTimeout(() => r.remove(), 600);
  });
})();

/*

   a stray editable text caret next to the heading)

/* 5. ROLE CARD SELECTION */
document.querySelectorAll('.role-card').forEach(card => {
  card.addEventListener('click', function() {
    document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
    this.classList.add('selected');
    document.getElementById('regRole').value = this.dataset.role;
    updateProgress(2);
  });
});

function updateProgress(step) {
  const steps = document.querySelectorAll('.reg-step');
  const fills = document.querySelectorAll('.reg-step-line-fill');
  steps.forEach((s,i) => {
    s.classList.remove('active','done');
    if (i+1 < step) s.classList.add('done');
    else if (i+1 === step) s.classList.add('active');
  });
  fills.forEach((f,i) => {
    const willFill = (i+1 < step);
    const wasFilled = f.style.width === '100%';
    f.style.width = willFill ? '100%' : '0%';
    if (willFill && !wasFilled) {
      f.classList.remove('traveling');
      requestAnimationFrame(() => f.classList.add('traveling'));
    } else if (!willFill) {
      f.classList.remove('traveling');
    }
  });
}

/* 6. PASSWORD STRENGTH */
const pwInput = document.getElementById('regPassword');
const segs = [document.getElementById('seg1'),document.getElementById('seg2'),document.getElementById('seg3'),document.getElementById('seg4')];
const hint  = document.getElementById('strengthHint');
pwInput.addEventListener('input', function() {
  const v = this.value; let level = 0;
  const hints  = ['','Weak – add more characters','Fair – try a number','Good – add symbols','Strong password!'];
  const colors = ['','weak','fair','good','strong'];
  if (v.length >= 6) level = 1;
  if (v.length >= 8 && /[0-9]/.test(v)) level = 2;
  if (v.length >= 8 && /[0-9]/.test(v) && /[A-Z]/.test(v)) level = 3;
  if (v.length >= 10 && /[0-9]/.test(v) && /[A-Z]/.test(v) && /[^A-Za-z0-9]/.test(v)) level = 4;
  segs.forEach((seg,i) => { seg.className = 'strength-seg' + (i < level ? ' ' + colors[level] : ''); });
  hint.textContent = v.length ? hints[level] : '';
  hint.style.color = ['','#ef4444','#f59e0b','#3b82f6','#10b981'][level];
  if (level >= 2) updateProgress(2);
});

/* 7. PASSWORD TOGGLE */
document.getElementById('toggleRegPassword').addEventListener('click', function() {
  const inp = document.getElementById('regPassword');
  const isPass = inp.type === 'password';
  inp.type = isPass ? 'text' : 'password';
  document.getElementById('eyeOpen').style.display  = isPass ? 'none' : '';
  document.getElementById('eyeClosed').style.display = isPass ? '' : 'none';
});

/* 8. EMAIL WATCHER */
document.getElementById('regEmail').addEventListener('input', function() {
  if (this.value.includes('@')) updateProgress(2);
});

/* 9. REGISTER FORM SUBMIT */
document.getElementById('registerForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const name     = document.getElementById('regName').value.trim();
  const email    = document.getElementById('regEmail').value.trim();
  const company  = document.getElementById('regCompany').value.trim();
  const role     = document.getElementById('regRole').value;
  const password = document.getElementById('regPassword').value;
  const btn      = document.getElementById('registerBtn');

  const users = JSON.parse(localStorage.getItem('ojashdesk_users') || '[]');
  if (users.find(u => u.email.toLowerCase() === email.toLowerCase())) {
    showToast('An account with this email already exists.', 'error'); return;
  }
  btn.classList.add('loading');
  updateProgress(3);
  setTimeout(() => {
    btn.classList.remove('loading');
    const newUser = { name, email, company, role, password, createdAt: new Date().toISOString() };
    users.push(newUser);
    localStorage.setItem('ojashdesk_users', JSON.stringify(users));
    localStorage.setItem('ojashdesk_current_user', JSON.stringify(newUser));
    showToast('Account created! Welcome aboard 🎉', 'success');
    setTimeout(() => { window.location.href = role === 'Customer' ? 'customer-portal.html' : 'index.html'; }, 800);
  }, 900);
});

/* 10. OAUTH */
document.getElementById('googleRegBtn').addEventListener('click', () => handleOAuthLogin('google','index.html'));
document.getElementById('githubRegBtn').addEventListener('click', () => handleOAuthLogin('github','index.html'));

/* 11. TOAST */
function showToast(msg, type) {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast ' + (type||'info'); t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.animation='slideOut .3s ease'; setTimeout(()=>t.remove(),300); }, 2500);
}
</script>
