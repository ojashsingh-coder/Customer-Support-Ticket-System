<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0d9ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#7c3aed" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Outer rounded square background -->
  <rect x="10" y="10" width="180" height="180" rx="40" ry="40"
        fill="url(#bgGrad)" filter="url(#shadow)" />

  <!-- Subtle inner glow ring -->
  <rect x="10" y="10" width="180" height="180" rx="40" ry="40"
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" />

  <!-- Lightning bolt icon (centered, bold) -->
  <g filter="url(#glow)" transform="translate(100,100)">
    <path d="M12 -46 L-18 6 H4 L-8 46 L22 -8 H0 Z"
          fill="url(#boltGrad)"
          stroke="rgba(255,255,255,0.3)"
          stroke-width="1"
          stroke-linejoin="round" />
  </g>
</svg>