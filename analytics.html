<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

.analytics-container{
    width:90%;
    margin:auto;
    margin-top:30px;
}

.analytics-cards{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:40px;
}

.analytics-card{
    background:#2f3b52;
    color:white;
    width:220px;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 10px rgba(255,255,255,0.1);
}

.analytics-card h3{
    margin-bottom:15px;
}

.analytics-card p{
    font-size:35px;
    font-weight:bold;
}

.chart-container{
    background:white;
    padding:20px;
    border-radius:15px;
    width:700px;
    max-width:100%;
    margin:auto;
}

.back-btn{
    margin:20px;
}

</style>

</head>
<body>

<header>
    <h1>Ticket Analytics Dashboard</h1>
</header>

<div class="back-btn">
    <a href="dashboard.html">
        <button>← Back to Dashboard</button>
    </a>
</div>

<div class="analytics-container">

    <div class="analytics-cards">

        <div class="analytics-card">
            <h3>Total Tickets</h3>
            <p id="totalTickets">0</p>
        </div>

        <div class="analytics-card">
            <h3>Open Tickets</h3>
            <p id="openTickets">0</p>
        </div>

        <div class="analytics-card">
            <h3>Resolved Tickets</h3>
            <p id="resolvedTickets">0</p>
        </div>

        <div class="analytics-card">
            <h3>In Progress</h3>
            <p id="progressTickets">0</p>
        </div>

    </div>

    <div class="chart-container">
        <canvas id="ticketChart"></canvas>
    </div>

</div>

<script>

async function loadAnalytics(){

    try{

        const response = await fetch("/tickets");
        const tickets = await response.json();

        const totalTickets = tickets.length;

        const openTickets =
        tickets.filter(ticket =>
            ticket.status === "Open"
        ).length;

        const resolvedTickets =
        tickets.filter(ticket =>
            ticket.status === "Resolved"
        ).length;

        const progressTickets =
        tickets.filter(ticket =>
            ticket.status === "In Progress"
        ).length;

        document.getElementById("totalTickets").innerText =
        totalTickets;

        document.getElementById("openTickets").innerText =
        openTickets;

        document.getElementById("resolvedTickets").innerText =
        resolvedTickets;

        document.getElementById("progressTickets").innerText =
        progressTickets;

        const ctx =
        document.getElementById("ticketChart").getContext("2d");

        new Chart(ctx, {
            type: "bar",
            data: {
                labels: [
                    "Open",
                    "Resolved",
                    "In Progress"
                ],
                datasets: [{
                    label: "Tickets",
                    data: [
                        openTickets,
                        resolvedTickets,
                        progressTickets
                    ],
                    backgroundColor: [
                        "#f59e0b",
                        "#10b981",
                        "#3b82f6"
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        display: true
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

    }
    catch(error){

        console.log(error);
        alert("Failed to load analytics");

    }

}

loadAnalytics();

</script>

</body>
</html>
