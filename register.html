<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up · Ojash Desk</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-bg-glow top-left"></div>
  <div class="auth-bg-glow bottom-right"></div>

  <div class="auth-container">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="auth-logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/></svg>
        </div>
        <div>
          <div class="auth-logo-text">Ojash Desk</div>
          <div class="auth-logo-sub">Support Workspace</div>
        </div>
      </div>

      <div class="auth-title">Create your account</div>
      <div class="auth-subtitle">Start managing support tickets in minutes</div>

      <form id="registerForm">
        <div class="form-group">
          <label class="form-label" for="regName">Full name</label>
          <div class="input-icon-wrap">
            <span class="icon-left">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input class="form-input" type="text" id="regName" placeholder="Ojash Singh" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="regEmail">Email address</label>
          <div class="input-icon-wrap">
            <span class="icon-left">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16a2 2 0 012 2v12a2 2 0 01-2 2H4a2 2 0 01-2-2V6a2 2 0 012-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <input class="form-input" type="email" id="regEmail" placeholder="you@company.com" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="regCompany">Company name</label>
          <div class="input-icon-wrap">
            <span class="icon-left">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 9h1m4 0h1m-6 4h1m4 0h1m-6 4h1m4 0h1"/></svg>
            </span>
            <input class="form-input" type="text" id="regCompany" placeholder="Your company">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="regRole">I am a</label>
          <select class="form-select" id="regRole">
            <option value="Admin">Support Admin</option>
            <option value="Agent">Support Agent</option>
            <option value="Customer">Customer</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="regPassword">Password</label>
          <div class="input-icon-wrap">
            <span class="icon-left">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            </span>
            <input class="form-input with-right" type="password" id="regPassword" placeholder="Create a password" required minlength="6">
            <span class="icon-right" id="toggleRegPassword">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </span>
          </div>
          <div class="strength-bar" id="strengthBar"><div class="strength-fill"></div></div>
        </div>

        <div class="form-group" style="margin-bottom:18px;">
          <label class="form-check">
            <input type="checkbox" id="agreeTerms" required>
            <label for="agreeTerms">I agree to the Terms of Service and Privacy Policy</label>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-full">Create Account</button>
      </form>

      <div class="auth-divider">OR SIGN UP WITH</div>

      <button class="auth-social-btn" id="googleRegBtn">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Log in</a>
      </div>

    </div>
    <div class="auth-logo-sub" style="margin-top:20px;">
      © 2026 Ojash Desk. Owned by Ojash Singh. Created by OjashSingh.
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
  const pwInput = document.getElementById('regPassword');
  const strengthBar = document.getElementById('strengthBar');
  pwInput.addEventListener('input', function(){
    const v = this.value;
    let cls = 'strength-weak';
    if (v.length >= 10 && /[A-Z]/.test(v) && /[0-9]/.test(v) && /[^A-Za-z0-9]/.test(v)) cls = 'strength-strong';
    else if (v.length >= 8 && /[0-9]/.test(v)) cls = 'strength-good';
    else if (v.length >= 6) cls = 'strength-fair';
    strengthBar.className = 'strength-bar ' + (v.length ? cls : '');
  });

  document.getElementById('toggleRegPassword').addEventListener('click', function(){
    pwInput.type = pwInput.type === 'password' ? 'text' : 'password';
  });

  document.getElementById('registerForm').addEventListener('submit', function(e){
    e.preventDefault();
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const company = document.getElementById('regCompany').value.trim();
    const role = document.getElementById('regRole').value;
    const password = document.getElementById('regPassword').value;

    const users = JSON.parse(localStorage.getItem('ojashdesk_users') || '[]');
    if (users.find(u => u.email === email)) {
      showToast('An account with this email already exists.', 'error');
      return;
    }
    const newUser = { name, email, company, role, password, createdAt: new Date().toISOString() };
    users.push(newUser);
    localStorage.setItem('ojashdesk_users', JSON.stringify(users));
    localStorage.setItem('ojashdesk_current_user', JSON.stringify(newUser));
    showToast('Account created! Redirecting...', 'success');
    setTimeout(() => {
      window.location.href = role === 'Customer' ? 'customer-portal.html' : 'index.html';
    }, 700);
  });

  document.getElementById('googleRegBtn').addEventListener('click', function(){
    showToast('Google sign-up is not configured in this demo.', 'warning');
  });

  function showToast(msg, type){
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = 'toast ' + (type||'info');
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => { t.style.animation='slideOut .3s ease'; setTimeout(()=>t.remove(),300); }, 2500);
  }
</script>
</body>
</html>
