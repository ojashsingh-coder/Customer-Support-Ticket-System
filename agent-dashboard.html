<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Dashboard</title>

<link rel="stylesheet" href="style.css">

<style>
.container{
    display:flex;
    min-height:100vh;
}

.sidebar{
    width:250px;
    background:#1e293b;
    padding:20px;
}

.sidebar h2{
    color:white;
    margin-bottom:20px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:12px;
    margin-bottom:10px;
    background:#334155;
    border-radius:8px;
}

.sidebar a:hover{
    background:#475569;
}

.main-content{
    flex:1;
    padding:30px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-top:20px;
}

.card{
    background:#334155;
    padding:20px;
    border-radius:12px;
    text-align:center;
}

.card h3{
    margin-bottom:10px;
}

.card p{
    font-size:32px;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

    <div class="sidebar">

        <h2>Agent Panel</h2>

        <a href="agent-dashboard.html">Dashboard</a>
        <a href="admin-panel.html">Tickets</a>
        <a href="live-chat.html">Live Chat</a>
        <a href="knowledge-base.html">Knowledge Base</a>
        <a href="analytics.html">Reports</a>

        <a href="#" onclick="logout()">Logout</a>

    </div>

    <div class="main-content">

        <h1>Support Agent Dashboard</h1>

        <div class="cards">

            <div class="card">
                <h3>Total Tickets</h3>
                <p id="totalTickets">0</p>
            </div>

            <div class="card">
                <h3>Open Tickets</h3>
                <p id="openTickets">0</p>
            </div>

            <div class="card">
                <h3>Resolved Tickets</h3>
                <p id="resolvedTickets">0</p>
            </div>

        </div>

    </div>

</div>

<script>

async function loadStats(){

    const response = await fetch("/tickets");
    const tickets = await response.json();

    document.getElementById("totalTickets").innerText =
        tickets.length;

    document.getElementById("openTickets").innerText =
        tickets.filter(t => t.status === "Open").length;

    document.getElementById("resolvedTickets").innerText =
        tickets.filter(t => t.status === "Resolved").length;
}

function logout(){

    localStorage.removeItem("email");
    window.location.href = "login.html";
}

loadStats();

</script>

</body>
</html>
