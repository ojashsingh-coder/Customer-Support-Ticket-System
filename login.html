<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In · Ojash Desk</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-bg-glow top-left"></div>
  <div class="auth-bg-glow bottom-right"></div>

  <div class="auth-container">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="auth-logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/></svg>
        </div>
        <div>
          <div class="auth-logo-text">Ojash Desk</div>
          <div class="auth-logo-sub">Support Workspace</div>
        </div>
      </div>

      <div class="auth-title">Welcome back</div>
      <div class="auth-subtitle">Log in to manage your support tickets</div>

      <div id="loginError" class="toast error hidden" style="margin-bottom:16px;width:100%;max-width:none;">
        Invalid email or password.
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email address</label>
          <div class="input-icon-wrap">
            <span class="icon-left">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16a2 2 0 012 2v12a2 2 0 01-2 2H4a2 2 0 01-2-2V6a2 2 0 012-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <input class="form-input" type="email" id="loginEmail" placeholder="you@company.com" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <div class="input-icon-wrap">
            <span class="icon-left">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            </span>
            <input class="form-input with-right" type="password" id="loginPassword" placeholder="Enter your password" required>
            <span class="icon-right" id="toggleLoginPassword">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </span>
          </div>
        </div>

        <a href="#" class="forgot-link" id="forgotPasswordLink">Forgot password?</a>

        <div class="form-group" style="margin-bottom:18px;">
          <label class="form-check">
            <input type="checkbox" id="rememberMe">
            <label for="rememberMe">Remember me for 30 days</label>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-full">Log In</button>
      </form>

      <div class="auth-divider">OR CONTINUE WITH</div>

      <button class="auth-social-btn" id="googleLoginBtn">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
      <button class="auth-social-btn" id="githubLoginBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0a12 12 0 00-3.79 23.4c.6.11.82-.26.82-.58v-2.02c-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.5.99.11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 016 0c2.29-1.55 3.3-1.23 3.3-1.23.66 1.66.24 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.49 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58A12 12 0 0012 0z"/></svg>
        Continue with GitHub
      </button>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Sign up free</a>
      </div>
      <div class="auth-footer" style="margin-top:6px;">
        Are you a customer? <a href="customer-portal.html">Go to Customer Portal</a>
      </div>

    </div>
    <div class="auth-logo-sub" style="margin-top:20px;">
      © 2026 Ojash Desk. Owned by Ojash Singh. Created by OjashSingh.
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
  document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errBox = document.getElementById('loginError');

    const users = JSON.parse(localStorage.getItem('ojashdesk_users') || '[]');
    const agentDefault = { email: 'ojash@ojashdesk.com', password: 'admin123', name: 'Ojash Singh', role: 'Admin' };
    const match = [agentDefault, ...users].find(u => u.email === email && u.password === password);

    if (match) {
      errBox.classList.add('hidden');
      localStorage.setItem('ojashdesk_current_user', JSON.stringify(match));
      showToast('Welcome back, ' + match.name + '!', 'success');
      setTimeout(() => window.location.href = 'index.html', 600);
    } else {
      errBox.classList.remove('hidden');
    }
  });

  document.getElementById('toggleLoginPassword').addEventListener('click', function(){
    const inp = document.getElementById('loginPassword');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  });

  document.getElementById('googleLoginBtn').addEventListener('click', function(){
    showToast('Google login is not configured in this demo.', 'warning');
  });
  document.getElementById('githubLoginBtn').addEventListener('click', function(){
    showToast('GitHub login is not configured in this demo.', 'warning');
  });

  function showToast(msg, type){
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = 'toast ' + (type||'info');
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => { t.style.animation='slideOut .3s ease'; setTimeout(()=>t.remove(),300); }, 2500);
  }
</script>
<script src="fixes.js"></script>
</body>
</html>
