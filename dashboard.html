<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link rel="stylesheet" href="style.css">

<style>

.top-bar{
    display:flex;
    justify-content:flex-end;
    padding:20px 40px 0 40px;
}

.logout-btn{
    background:red;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

.dashboard-title{
    text-align:center;
    margin-top:10px;
}

.action-buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin:30px 0;
}

.action-buttons button{
    min-width:180px;
}

.stats-container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:25px;
    margin-top:20px;
}

</style>

</head>
<body>

<div class="top-bar">

    <button class="logout-btn" onclick="logout()">
        Logout
    </button>

</div>

<div class="dashboard-title">
    <h1>Customer Dashboard</h1>
</div>

<div class="action-buttons">

    <a href="create-ticket.html">
        <button>Create Ticket</button>
    </a>

    <a href="my-tickets.html">
        <button>My Tickets</button>
    </a>

    <a href="analytics.html">
        <button>Analytics</button>
    </a>

    <a href="knowledge-base.html">
        <button>Knowledge Base</button>
    </a>

    <a href="live-chat.html">
        <button>Live Chat</button>
    </a>

</div>

<div class="stats-container">

    <div class="card">
        <h3>Total Tickets</h3>
        <p id="totalTickets">0</p>
    </div>

    <div class="card">
        <h3>Open Tickets</h3>
        <p id="openTickets">0</p>
    </div>

    <div class="card">
        <h3>In Progress</h3>
        <p id="progressTickets">0</p>
    </div>

    <div class="card">
        <h3>Resolved Tickets</h3>
        <p id="resolvedTickets">0</p>
    </div>

</div>

<script>

async function loadStats(){

    try{

        const email = localStorage.getItem("email");

        const response =
        await fetch("/my-tickets/" + email);

        const tickets =
        await response.json();

        document.getElementById("totalTickets").innerText =
        tickets.length;

        document.getElementById("openTickets").innerText =
        tickets.filter(ticket =>
            ticket.status === "Open"
        ).length;

        document.getElementById("progressTickets").innerText =
        tickets.filter(ticket =>
            ticket.status === "In Progress"
        ).length;

        document.getElementById("resolvedTickets").innerText =
        tickets.filter(ticket =>
            ticket.status === "Resolved"
        ).length;

    }
    catch(error){

        console.log(error);

    }
}

function logout(){

    localStorage.removeItem("email");

    window.location.href =
    "login.html";

}

loadStats();

</script>

</body>
</html>
