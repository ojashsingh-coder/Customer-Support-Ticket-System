<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<link rel="stylesheet" href="style.css">

<style>

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background:white;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

th{
    background:#4f46e5;
    color:white;
}

td{
    color:black !important;
    background:white;
}

select{
    padding:5px;
    color:black !important;
}

button{
    padding:8px 15px;
    cursor:pointer;
}

#searchInput{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
    color:black;
}

#suggestions{
    position:absolute;
    width:100%;
    background:white;
    border:1px solid #ccc;
    max-height:200px;
    overflow-y:auto;
    z-index:1000;
}

.suggestion-item{
    padding:10px;
    cursor:pointer;
    color:black;
}

.suggestion-item:hover{
    background:#f0f0f0;
}

.toolbar{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

.delete-btn{
    background:red;
    color:white;
    border:none;
    border-radius:5px;
}

</style>

</head>

<body>

<header>
    <h1>Admin Control Panel</h1>
</header>

<div class="dashboard">

    <div class="card">
        <h3>Total Tickets</h3>
        <p id="totalTickets">0</p>
    </div>

    <div class="card">
        <h3>Open Tickets</h3>
        <p id="openTickets">0</p>
    </div>

    <div class="card">
        <h3>Resolved Tickets</h3>
        <p id="resolvedTickets">0</p>
    </div>

</div>

<div style="padding:20px">

    <h2>All Support Tickets</h2>

    <div class="toolbar">

        <button onclick="exportCSV()">
            Export CSV
        </button>

        <button onclick="loadTickets()">
            Refresh
        </button>

        <a href="analytics.html">
            <button>
                Analytics
            </button>
        </a>

    </div>

    <div style="position:relative; margin-bottom:15px;">

        <input
            type="text"
            id="searchInput"
            placeholder="Search by Email, Category, Priority or Status..."
            onkeyup="searchTickets()"
            autocomplete="off"
        >

        <div id="suggestions"></div>

    </div>

    <table>

        <thead>
            <tr>
                <th>ID</th>
                <th>Email</th>
                <th>Category</th>
                <th>Priority</th>
                <th>Description</th>
                <th>Status</th>
                <th>Update</th>
                <th>Delete</th>
            </tr>
        </thead>

        <tbody id="ticketTable"></tbody>

    </table>

</div>

<script>

async function loadTickets(){

    const response = await fetch("/tickets");
    const tickets = await response.json();

    let html = "";

    let openCount = 0;
    let resolvedCount = 0;

    tickets.forEach(ticket => {

        if(ticket.status === "Open"){
            openCount++;
        }

        if(ticket.status === "Resolved"){
            resolvedCount++;
        }

        html += `
        <tr>

            <td>${ticket.id}</td>
            <td>${ticket.customer_email || ""}</td>
            <td>${ticket.category || ""}</td>
            <td>${ticket.priority || ""}</td>
            <td>${ticket.description || ""}</td>

            <td>
                <select id="status-${ticket.id}">
                    <option value="Open" ${ticket.status==="Open"?"selected":""}>Open</option>
                    <option value="In Progress" ${ticket.status==="In Progress"?"selected":""}>In Progress</option>
                    <option value="Resolved" ${ticket.status==="Resolved"?"selected":""}>Resolved</option>
                </select>
            </td>

            <td>
                <button onclick="updateStatus(${ticket.id})">
                    Update
                </button>
            </td>

            <td>
                <button
                    class="delete-btn"
                    onclick="deleteTicket(${ticket.id})">
                    Delete
                </button>
            </td>

        </tr>
        `;
    });

    document.getElementById("ticketTable").innerHTML = html;

    document.getElementById("totalTickets").innerText = tickets.length;
    document.getElementById("openTickets").innerText = openCount;
    document.getElementById("resolvedTickets").innerText = resolvedCount;
}

async function updateStatus(id){

    const status =
    document.getElementById(`status-${id}`).value;

    const response = await fetch("/update-ticket",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            id,
            status
        })

    });

    const data = await response.json();

    alert(data.message);

    loadTickets();
}

async function deleteTicket(id){

    if(!confirm("Delete this ticket?")){
        return;
    }

    const response = await fetch("/delete-ticket",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            id
        })

    });

    const data = await response.json();

    alert(data.message);

    loadTickets();
}

function exportCSV(){

    let csv = [];
    let rows = document.querySelectorAll("table tr");

    rows.forEach(row => {

        let cols = row.querySelectorAll("th,td");

        let rowData = [];

        cols.forEach(col => {
            rowData.push(col.innerText);
        });

        csv.push(rowData.join(","));
    });

    let csvFile = new Blob(
        [csv.join("\n")],
        {type:"text/csv"}
    );

    let downloadLink =
    document.createElement("a");

    downloadLink.download =
    "tickets.csv";

    downloadLink.href =
    window.URL.createObjectURL(csvFile);

    downloadLink.click();
}

function searchTickets(){

    let input =
    document.getElementById("searchInput")
    .value
    .toLowerCase();

    let rows =
    document.querySelectorAll("#ticketTable tr");

    let suggestions = new Set();

    rows.forEach(row => {

        let text =
        row.innerText.toLowerCase();

        if(text.includes(input)){

            row.style.display = "";

            row.innerText.split("\n").forEach(item => {

                if(
                    item.toLowerCase().includes(input)
                    &&
                    item.trim() !== ""
                ){
                    suggestions.add(item.trim());
                }

            });

        }else{
            row.style.display = "none";
        }

    });

    showSuggestions([...suggestions].slice(0,5));
}

function showSuggestions(items){

    const box =
    document.getElementById("suggestions");

    box.innerHTML = "";

    if(document.getElementById("searchInput").value.trim()===""){
        return;
    }

    items.forEach(item => {

        const div =
        document.createElement("div");

        div.className =
        "suggestion-item";

        div.innerText = item;

        div.onclick = () => {

            document.getElementById(
                "searchInput"
            ).value = item;

            searchTickets();

            box.innerHTML = "";
        };

        box.appendChild(div);

    });
}

loadTickets();

</script>

</body>
</html>
